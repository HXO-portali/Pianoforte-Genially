<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pianoforte</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    width: 100%;
    height: 100%;
  }

  .piano-frame {
    display: flex;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    background: linear-gradient(180deg, #2b2b2b, #0a0a0a);
    padding: 2% 1.5% 3% 1.5%;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }

  .keys {
    position: relative;
    display: flex;
    width: 100%;
    height: 100%;
    user-select: none;
  }

  .white-key {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    height: 100%;
    background: linear-gradient(180deg, #ffffff, #f2f0ea);
    border: 1px solid #999;
    border-radius: 0 0 6px 6px;
    margin-right: -1px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 6%;
    cursor: pointer;
    transition: background 0.05s ease;
    z-index: 1;
  }

  .white-key:active,
  .white-key.pressed {
    background: linear-gradient(180deg, #e2ded3, #cfc9ba);
  }

  .white-key .num {
    font-size: min(4vw, 3.2vh, 26px);
    font-weight: bold;
    color: #333;
    margin-bottom: 4%;
  }

  .white-key .note {
    font-size: min(3.4vw, 2.8vh, 22px);
    color: #444;
  }

  .black-key {
    position: absolute;
    width: 4.2%;
    height: 62%;
    background: linear-gradient(180deg, #3a3a3a, #000);
    border: 1px solid #000;
    border-radius: 0 0 4px 4px;
    z-index: 2;
    cursor: pointer;
    top: 0;
  }

  .black-key:active,
  .black-key.pressed {
    background: linear-gradient(180deg, #5a5a5a, #1a1a1a);
  }
</style>
</head>
<body>

<div class="piano-frame">
  <div class="keys" id="keys"></div>
</div>

<script>
// ---- Definizione tasti: due ottave, notazione solfeggio italiana ----
const whiteNotes = [
  { name: 'Do', num: 1, freq: 261.63 },
  { name: 'Re', num: 2, freq: 293.66 },
  { name: 'Mi', num: 3, freq: 329.63 },
  { name: 'Fa', num: 4, freq: 349.23 },
  { name: 'Sol', num: 5, freq: 392.00 },
  { name: 'La', num: 6, freq: 440.00 },
  { name: 'Si', num: 7, freq: 493.88 },
  { name: 'Do', num: 1, freq: 523.25 },
  { name: 'Re', num: 2, freq: 587.33 },
  { name: 'Mi', num: 3, freq: 659.25 },
  { name: 'Fa', num: 4, freq: 698.46 },
  { name: 'Sol', num: 5, freq: 783.99 },
  { name: 'La', num: 6, freq: 880.00 },
  { name: 'Si', num: 7, freq: 987.77 }
];

const blackPattern = [
  { after: 0, freq: 277.18 }, // Do#
  { after: 1, freq: 311.13 }, // Re#
  { after: 3, freq: 369.99 }, // Fa#
  { after: 4, freq: 415.30 }, // Sol#
  { after: 5, freq: 466.16 }, // La#
];

const blackNotes = [];
[0, 1].forEach(octave => {
  blackPattern.forEach(b => {
    blackNotes.push({
      after: b.after + octave * 7,
      freq: b.freq * Math.pow(2, octave)
    });
  });
});

const keysContainer = document.getElementById('keys');
const totalWhiteKeys = whiteNotes.length; // 14
const whiteKeyPercent = 100 / totalWhiteKeys;

whiteNotes.forEach((note, i) => {
  const key = document.createElement('div');
  key.className = 'white-key';
  key.innerHTML = `<div class="num">${note.num}</div><div class="note">${note.name}</div>`;
  keysContainer.appendChild(key);
  bindKey(key, note.freq);
});

blackNotes.forEach(b => {
  const key = document.createElement('div');
  key.className = 'black-key';
  const centerPercent = (b.after + 1) * whiteKeyPercent;
  key.style.left = `calc(${centerPercent}% - 2.1%)`;
  keysContainer.appendChild(key);
  bindKey(key, b.freq);
});

// ---- Audio: sintesi semplice tipo pianoforte con Web Audio API ----
let audioCtx = null;
function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playNote(freq) {
  const ctx = getCtx();
  const now = ctx.currentTime;

  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();

  osc1.type = 'triangle';
  osc2.type = 'sine';
  osc1.frequency.setValueAtTime(freq, now);
  osc2.frequency.setValueAtTime(freq * 2, now);

  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0.15, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.5, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);

  osc1.connect(gain);
  osc2.connect(gain2);
  gain2.connect(gain);
  gain.connect(ctx.destination);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + 1.3);
  osc2.stop(now + 1.3);
}

function bindKey(el, freq) {
  const press = (e) => {
    e.preventDefault();
    playNote(freq);
    el.classList.add('pressed');
  };
  const release = () => el.classList.remove('pressed');

  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
  el.addEventListener('touchstart', press, { passive: false });
  el.addEventListener('touchend', release);
}
</script>

</body>
</html>
